<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dunia Kecil untuk Grace 🌸</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050308;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      color: #fff;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      cursor: grab;
    }

    #canvas-container.dragging {
      cursor: none;
      /* Hide cursor when moving camera */
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #title-banner {
      text-align: center;
      animation: fadeInDown 1s ease-out;
    }

    #title-banner h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: 2.2rem;
      color: #f9d4e8;
      text-shadow: 0 0 20px rgba(249, 180, 220, 0.4);
      letter-spacing: 0.1em;
    }

    #title-banner p {
      font-size: 0.7rem;
      color: rgba(249, 212, 232, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.4em;
      margin-top: 5px;
    }

    #birthday-badge {
      position: absolute;
      top: 30px;
      right: 30px;
      background: rgba(249, 180, 220, 0.08);
      border: 1px solid rgba(249, 180, 220, 0.2);
      border-radius: 30px;
      padding: 8px 20px;
      font-size: 0.75rem;
      color: #f9d4e8;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      animation: Pulse 2s infinite ease-in-out;
    }

    /* Controls hint - Premium look */
    #controls-hint {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(10, 6, 18, 0.4);
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      width: fit-content;
      position: absolute;
      bottom: 140px;
      left: 20px;
    }

    .hint-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .key {
      width: 32px;
      height: 32px;
      border: 1px solid rgba(249, 180, 220, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: #f9d4e8;
      background: rgba(249, 180, 220, 0.05);
    }

    .hint-label {
      font-size: 0.65rem;
      color: rgba(249, 180, 220, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Bubbles & Prompts */
    #interact-prompt {
      position: absolute;
      bottom: 25%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(249, 180, 220, 0.15);
      border: 1px solid rgba(249, 180, 220, 0.3);
      border-radius: 30px;
      padding: 10px 25px;
      color: #fff;
      font-size: 0.85rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      display: none;
      animation: fadeInUp 0.4s ease;
    }

    #interact-prompt.visible {
      display: block;
    }

    #npc-bubble {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 6, 18, 0.85);
      border: 1px solid rgba(249, 180, 220, 0.2);
      border-radius: 20px;
      padding: 20px 30px;
      max-width: 400px;
      color: #f9d4e8;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-style: italic;
      display: none;
      text-align: center;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    #npc-bubble.visible {
      display: block;
    }

    /* Chat Panel - Premium Glassmorphism */
    #chat-panel {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 500px;
      pointer-events: all;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 20px;
      backdrop-filter: blur(20px);
      margin-bottom: 10px;
      transition: all 0.3s ease;
    }

    #chat-panel:focus-within {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(249, 180, 220, 0.3);
    }

    #chat-messages {
      max-height: 120px;
      overflow-y: auto;
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 5px;
    }

    #chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    #chat-messages::-webkit-scrollbar-thumb {
      background: rgba(249, 180, 220, 0.2);
      border-radius: 2px;
    }

    .msg {
      font-size: 0.85rem;
      line-height: 1.6;
      color: #f9d4e8;
      animation: fadeInUp 0.3s ease;
    }

    .msg.grace {
      color: rgba(255, 255, 255, 0.7);
      font-weight: 300;
    }

    #chat-input-row {
      display: flex;
      gap: 12px;
    }

    #chat-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 18px;
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    #chat-input:focus {
      border-color: rgba(249, 180, 220, 0.5);
      background: rgba(255, 255, 255, 0.08);
    }

    #send-btn {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #f9d4e8, #ff85c0);
      border: none;
      border-radius: 12px;
      color: #3d1f0a;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    #send-btn:hover {
      transform: scale(1.05);
    }

    .heart-float {
      position: fixed;
      font-size: 1.1rem;
      animation: floatHeart 3s ease-in forwards;
      pointer-events: none;
      z-index: 100;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes Pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.05);
        opacity: 1;
      }
    }

    @keyframes floatHeart {
      0% {
        opacity: 1;
        transform: translateY(0);
      }

      100% {
        opacity: 0;
        transform: translateY(-110px) scale(0.4);
      }
    }

    /* Birthday Overlay */
    #birthday-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 6, 18, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      backdrop-filter: blur(10px);
    }

    #birthday-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #birthday-overlay img {
      max-width: 85%;
      max-height: 85%;
      box-shadow: 0 0 50px rgba(249, 180, 220, 0.3);
      border-radius: 20px;
      animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #close-hint {
      position: absolute;
      bottom: 40px;
      color: rgba(249, 180, 220, 0.6);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @keyframes zoomIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Mading Gallery Overlay */
    #mading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 6, 18, 0.96);
      z-index: 2000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(20px);
      transition: all 0.5s ease;
    }

    #mading-overlay.visible {
      display: flex;
      animation: fadeInUp 0.4s ease;
    }

    #mading-content {
      display: flex;
      gap: 40px;
      max-width: 90vw;
      overflow-x: auto;
      padding: 60px 20px;
      scroll-snap-type: x mandatory;
      scrollbar-width: thin;
      scrollbar-color: #f9d4e8 rgba(255, 255, 255, 0.05);
    }

    #mading-content::-webkit-scrollbar {
      height: 6px;
    }

    #mading-content::-webkit-scrollbar-thumb {
      background: #f9d4e8;
      border-radius: 3px;
    }

    .mading-item {
      flex: 0 0 auto;
      width: clamp(280px, 40vw, 450px);
      aspect-ratio: 3/4;
      background: #110a18;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(249, 180, 220, 0.2);
      scroll-snap-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      position: relative;
    }

    .mading-item img,
    .mading-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mading-close {
      position: absolute;
      top: 40px;
      right: 40px;
      color: #f9d4e8;
      cursor: pointer;
      font-size: 1rem;
      padding: 10px 20px;
      border: 1px solid rgba(249, 180, 220, 0.3);
      border-radius: 30px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .mading-close:hover {
      background: rgba(249, 180, 220, 0.1);
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div id="canvas-container"></div>
  <div id="hud">
    <div id="title-banner">
      <h1>Dunia Kecil untuk Grace</h1>
      <p>Selamat Ulang Tahun 🌸</p>
    </div>
    <div id="birthday-badge">🎂 Happy Birthday</div>

    <div id="controls-hint">
      <div class="hint-row">
        <div class="key">W</div>
        <div class="key">A</div>
        <div class="key">S</div>
        <div class="key">D</div>
        <div class="hint-label">Jalan</div>
      </div>
      <div class="hint-row">
        <div class="key">↑</div>
        <div class="key">←</div>
        <div class="key">↓</div>
        <div class="key">→</div>
        <div class="hint-label">Kamera</div>
      </div>
      <div class="hint-row">
        <div class="key">E</div>
        <div class="hint-label">Interaksi</div>
      </div>
    </div>

    <div id="npc-bubble">
      <div id="npc-name" style="font-size:0.6rem;opacity:0.6">💌 THORIQ</div><span id="npc-text"></span>
    </div>
    <div id="interact-prompt">Tekan <b>E</b> untuk menyapa Thoriq</div>

    <div id="chat-panel">
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Tulis sesuatu untuk Thoriq…" autocomplete="off" />
        <button id="send-btn">➤</button>
      </div>
    </div>
  </div>

  <div id="birthday-overlay">
    <img src="birthday_world_grace.svg" alt="Birthday Card">
    <div id="close-hint">Tekan <b>E</b> untuk kembali</div>
  </div>

  <div id="mading-overlay">
    <div class="mading-close" onclick="toggleMadingOverlay(false)">TUTUP (ESC)</div>
    <div id="mading-content"></div>
    <p style="margin-top:20px; color:rgba(249,212,232,0.4); font-size:0.75rem; letter-spacing:3px;">GESER UNTUK MELIHAT
      MEMORI KITA</p>
  </div>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Custom OOP Scripts -->
  <script src="js/World.js"></script>
  <script src="js/Character.js"></script>
  <script src="js/Engine.js"></script>

  <script>
    // Initialize the Game Engine
    const game = new Engine();

    // Interaction & Chat Logic (Kept here for easy editing)
    const npcLines = [
      "Grace sayang, kamu akhirnya datang! Aku nungguin kamu dari tadi di sini. 💗",
      "Happy birthday, Grace. Semoga semua mimpimu tahun ini jadi kenyataan ya. ✨",
      "Aku cinta kamu, Grace. Makanya aku bikin dunia kecil ini buat kita berdua. 💝"
    ];
    let lineIdx = 0;

    window.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'e') {
        const game = window.game;
        // Priority 1: Closing overlays
        if (game.isOverlayVisible) {
          toggleBirthdayOverlay(false);
          toggleMadingOverlay(false);
          return;
        }

        // Priority 2: Mading
        if (game.isNearMading) {
          toggleMadingOverlay(true);
          return;
        }

        // Priority 3: Wedding Cake / Surprise
        if (game.isNearCake) {
          toggleBirthdayOverlay(true);
          return;
        }

        // Priority 4: Talk to Thoriq
        if (game.isNearThoriq) {
          const text = npcLines[lineIdx % npcLines.length];
          document.getElementById('npc-text').textContent = text;
          document.getElementById('npc-bubble').classList.add('visible');
          setTimeout(() => document.getElementById('npc-bubble').classList.remove('visible'), 4000);
          lineIdx++;
          game.world.spawnHeart(0, 1.6);
        }
      }

      if (e.key === 'Escape') {
        toggleBirthdayOverlay(false);
        toggleMadingOverlay(false);
      }
    });

    function toggleBirthdayOverlay(show) {
      const game = window.game;
      game.isOverlayVisible = show;
      const overlay = document.getElementById('birthday-overlay');
      if (show) {
        overlay.classList.add('visible');
        game.world.spawnHeart(0, 0);
      } else {
        overlay.classList.remove('visible');
      }
    }

    function toggleMadingOverlay(show) {
      const game = window.game;
      game.isOverlayVisible = show;
      const overlay = document.getElementById('mading-overlay');
      const content = document.getElementById('mading-content');

      if (show) {
        const files = [
          { type: 'img', src: 'Poto/WhatsApp Image 2026-03-14 at 21.43.32.jpeg' },
          { type: 'img', src: 'Poto/WhatsApp Image 2026-03-14 at 21.43.33 (1).jpeg' },
          { type: 'img', src: 'Poto/WhatsApp Image 2026-03-14 at 21.43.33.jpeg' },
          { type: 'img', src: 'Poto/WhatsApp Image 2026-03-14 at 21.43.34 (1).jpeg' },
          { type: 'img', src: 'Poto/WhatsApp Image 2026-03-14 at 21.43.34.jpeg' },
          { type: 'img', src: 'Poto/WhatsApp Image 2026-03-14 at 21.43.35.jpeg' },
          { type: 'img', src: 'Poto/WhatsApp Image 2026-03-14 at 21.43.42 (1).jpeg' },
          { type: 'img', src: 'Poto/WhatsApp Image 2026-03-14 at 21.43.42.jpeg' },
          { type: 'vid', src: 'Poto/WhatsApp Video 2026-03-14 at 21.43.42.mp4' }
        ];

        content.innerHTML = files.map(f => `
          <div class="mading-item">
            ${f.type === 'img' ? `<img src="${f.src}">` : `<video src="${f.src}" controls autoplay loop></video>`}
          </div>
        `).join('');

        overlay.classList.add('visible');
      } else {
        overlay.classList.remove('visible');
      }
    }

    // Chat functionality
    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg grace';
      msgDiv.textContent = `🌸 Grace: ${text}`;
      document.getElementById('chat-messages').appendChild(msgDiv);
      input.value = '';

      // Simulating Thoriq's reply
      setTimeout(() => {
        const reply = document.createElement('div');
        reply.className = 'msg';
        reply.textContent = `💌 Thoriq: Aku selalu ada di sini buat kamu, Grace... 💗`;
        document.getElementById('chat-messages').appendChild(reply);
      }, 1000);
    }

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('chat-input').onkeydown = e => { if (e.key === 'Enter') sendMessage(); e.stopPropagation(); };
  </script>
</body>

</html>
